name: WinShim v0 Benchmark

on:
  workflow_dispatch:
    inputs:
      cache_state:
        description: "Container layer cache mode"
        required: true
        type: choice
        default: warm
        options:
          - warm
          - cold
          - force-miss
      run_label:
        description: "Label shown in the benchmark report"
        required: false
        default: manual
      runner_target:
        description: "Runner to benchmark against"
        required: true
        type: choice
        default: windows-latest
        options:
          - windows-latest
          - self-hosted

env:
  DOTNET_VERSION: "8.0.x"
  # Pinned on 2026-02-24 from floating tag mcr.microsoft.com/windows/nanoserver:ltsc2022 (amd64 manifest).
  NANO_IMAGE: "mcr.microsoft.com/windows/nanoserver@sha256:42f7526e855caf911bef2e05a3eb497497e4a6d431a37b216d7b345d5eee80c6"
  CACHE_KEY_BASE: "winshim-nano-layers-ltsc2022-sha42f7526e855c"

jobs:
  baseline:
    name: "Baseline [${{ matrix.run_index }}]"
    runs-on: ${{ inputs.runner_target }}
    strategy:
      fail-fast: false
      matrix:
        run_index: [1, 2, 3, 4, 5]

    steps:
      - uses: actions/checkout@v4

      - name: Prepare benchmark workload
        shell: pwsh
        run: ./scripts/benchmark/prepare-workload.ps1

      - name: Record start time
        id: timer_start
        shell: pwsh
        run: |
          $start = [DateTimeOffset]::UtcNow.ToUnixTimeMilliseconds()
          "start_ms=$start" >> $env:GITHUB_OUTPUT

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Record setup completion time
        id: timer_setup
        shell: pwsh
        run: |
          $setup = [DateTimeOffset]::UtcNow.ToUnixTimeMilliseconds()
          "setup_ms=$setup" >> $env:GITHUB_OUTPUT

      - name: Run baseline workload
        shell: pwsh
        run: |
          dotnet build .\benchmark-app\benchmark-app.csproj -c Release

      - name: Compute baseline metrics
        id: metrics
        shell: pwsh
        run: |
          $endMs = [DateTimeOffset]::UtcNow.ToUnixTimeMilliseconds()
          $startMs = [double]"${{ steps.timer_start.outputs.start_ms }}"
          $setupMs = [double]"${{ steps.timer_setup.outputs.setup_ms }}"

          $totalS = [math]::Round(($endMs - $startMs) / 1000, 2)
          $setupS = [math]::Round(($setupMs - $startMs) / 1000, 2)
          $buildS = [math]::Round(($endMs - $setupMs) / 1000, 2)

          "total_s=$totalS" >> $env:GITHUB_OUTPUT
          "setup_s=$setupS" >> $env:GITHUB_OUTPUT
          "build_s=$buildS" >> $env:GITHUB_OUTPUT

      - name: Write baseline timing JSON
        id: write_timing
        shell: pwsh
        run: |
          ./scripts/benchmark/write-timing.ps1 `
            -Scenario baseline `
            -RunIndex ${{ matrix.run_index }} `
            -CacheState "${{ inputs.cache_state }}" `
            -RunLabel "${{ inputs.run_label }}" `
            -TotalSeconds "${{ steps.metrics.outputs.total_s }}" `
            -SetupSeconds "${{ steps.metrics.outputs.setup_s }}" `
            -BuildSeconds "${{ steps.metrics.outputs.build_s }}" `
            -OutputPath "$env:RUNNER_TEMP\baseline-timing.json"

          "timing_path=$env:RUNNER_TEMP\baseline-timing.json" >> $env:GITHUB_OUTPUT

      - name: Upload baseline timing artifact
        uses: actions/upload-artifact@v4
        with:
          name: baseline-timing-${{ matrix.run_index }}
          path: ${{ steps.write_timing.outputs.timing_path }}
          if-no-files-found: error

  persistence_probe:
    name: Persistence Probe
    runs-on: ${{ inputs.runner_target }}
    outputs:
      hit: ${{ steps.probe.outputs.hit }}
      image_id: ${{ steps.probe.outputs.image_id }}
      probe_seconds: ${{ steps.probe.outputs.probe_seconds }}

    steps:
      - name: Ensure Docker daemon is ready
        shell: pwsh
        run: |
          $service = Get-Service -Name docker -ErrorAction Stop
          if ($service.Status -ne "Running") {
            Write-Host "Docker service status: $($service.Status). Starting service."
            Start-Service docker
          }

          $ready = $false
          for ($attempt = 1; $attempt -le 12; $attempt++) {
            docker version 2>$null | Out-Null
            if ($LASTEXITCODE -eq 0) {
              $ready = $true
              break
            }
            Start-Sleep -Seconds 5
          }

          if (-not $ready) {
            throw "Docker daemon is unavailable on this runner."
          }

      - name: Probe for persistent daemon layers
        id: probe
        shell: pwsh
        run: |
          $stopwatch = [System.Diagnostics.Stopwatch]::StartNew()
          $existing = docker images -q "winshim-nano:preload" 2>$null
          $stopwatch.Stop()

          $probeSeconds = [math]::Round($stopwatch.Elapsed.TotalSeconds, 3)
          $probeText = $probeSeconds.ToString("0.000", [System.Globalization.CultureInfo]::InvariantCulture)

          if ([string]::IsNullOrWhiteSpace($existing)) {
            "hit=false" >> $env:GITHUB_OUTPUT
            "image_id=" >> $env:GITHUB_OUTPUT
            Write-Host "Persistence probe: MISS - clean daemon (${probeText}s query)."
          } else {
            "hit=true" >> $env:GITHUB_OUTPUT
            "image_id=$existing" >> $env:GITHUB_OUTPUT
            Write-Host "Persistence probe: HIT - image already present ($existing) (${probeText}s query)."
          }

          "probe_seconds=$probeText" >> $env:GITHUB_OUTPUT

  winshim_setup:
    name: WinShim Setup
    runs-on: ${{ inputs.runner_target }}
    needs: [baseline, persistence_probe]
    outputs:
      tar_artifact_name: ${{ steps.artifact_meta.outputs.artifact_name }}
      image_digest: ${{ steps.load.outputs.image_digest }}
      image_id: ${{ steps.load.outputs.image_id }}
      image_tag: ${{ steps.load.outputs.image_tag }}
      load_source: ${{ steps.load.outputs.load_source }}
      load_duration_s: ${{ steps.load.outputs.image_load_s }}
      prep_total_s: ${{ steps.prep_total.outputs.prep_total_s }}

    steps:
      - uses: actions/checkout@v4

      - name: Ensure Docker daemon is ready
        shell: pwsh
        run: |
          $service = Get-Service -Name docker -ErrorAction Stop
          if ($service.Status -ne "Running") {
            Write-Host "Docker service status: $($service.Status). Starting service."
            Start-Service docker
          }

          $ready = $false
          for ($attempt = 1; $attempt -le 12; $attempt++) {
            docker version 2>$null | Out-Null
            if ($LASTEXITCODE -eq 0) {
              $ready = $true
              break
            }
            Start-Sleep -Seconds 5
          }

          if (-not $ready) {
            throw "Docker daemon is unavailable on this runner."
          }

      - name: Record setup start time
        id: prep_start
        shell: pwsh
        run: |
          $start = [DateTimeOffset]::UtcNow.ToUnixTimeMilliseconds()
          "prep_start_ms=$start" >> $env:GITHUB_OUTPUT

      - name: Pull, tag, and capture image identity
        id: load
        shell: pwsh
        run: |
          Write-Host "Cross-run probe result: hit=${{ needs.persistence_probe.outputs.hit }}, image_id='${{ needs.persistence_probe.outputs.image_id }}', probe_seconds=${{ needs.persistence_probe.outputs.probe_seconds }}"

          $targetTag = "winshim-nano:preload"
          $stopwatch = [System.Diagnostics.Stopwatch]::StartNew()
          $imageId = docker images -q $targetTag 2>$null
          $loadSource = "daemon-persistence"

          if ([string]::IsNullOrWhiteSpace($imageId)) {
            docker pull $env:NANO_IMAGE
            if ($LASTEXITCODE -ne 0) {
              throw "docker pull failed for image: $env:NANO_IMAGE"
            }

            docker tag $env:NANO_IMAGE $targetTag
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to tag image as $targetTag"
            }

            $imageId = docker images -q $targetTag
            if ([string]::IsNullOrWhiteSpace($imageId)) {
              throw "Image not found in daemon after pull and tag. Pull may have failed silently."
            }
            $loadSource = "registry"
          }
          $stopwatch.Stop()

          $imageDigest = ""
          if ($env:NANO_IMAGE -match "@") {
            $imageDigest = $env:NANO_IMAGE.Split("@")[1]
          }

          $loadS = [math]::Round($stopwatch.Elapsed.TotalSeconds, 3)
          $loadText = $loadS.ToString("0.00", [System.Globalization.CultureInfo]::InvariantCulture)

          "image_id=$imageId" >> $env:GITHUB_OUTPUT
          "image_tag=$targetTag" >> $env:GITHUB_OUTPUT
          "image_digest=$imageDigest" >> $env:GITHUB_OUTPUT
          "load_source=$loadSource" >> $env:GITHUB_OUTPUT
          "image_load_s=$loadText" >> $env:GITHUB_OUTPUT
          Write-Host "Identity captured: $targetTag ($imageId)"
          Write-Host "Image source: $loadSource, load time: ${loadText}s"

      - name: Smoke test image
        shell: pwsh
        run: |
          docker run --rm --isolation=process "winshim-nano:preload" cmd /c "echo ok"
          if ($LASTEXITCODE -ne 0) {
            throw "Image smoke test failed."
          }

      - name: Export image to tar
        id: export
        shell: pwsh
        run: |
          $exportDir = Join-Path $env:RUNNER_TEMP "nano-preload"
          New-Item -ItemType Directory -Path $exportDir -Force | Out-Null

          $tarPath = Join-Path $exportDir "nano-preload.tar"
          if (Test-Path $tarPath) {
            Remove-Item -Path $tarPath -Force
          }

          docker save "winshim-nano:preload" -o $tarPath
          if ($LASTEXITCODE -ne 0) {
            throw "docker save failed for image: winshim-nano:preload"
          }

          if (-not (Test-Path $tarPath)) {
            throw "Expected exported image tar at $tarPath"
          }

          "tar_path=$tarPath" >> $env:GITHUB_OUTPUT

      - name: Upload preloaded image artifact
        uses: actions/upload-artifact@v4
        with:
          name: nano-preload-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ steps.export.outputs.tar_path }}
          if-no-files-found: error

      - name: Emit setup artifact metadata
        id: artifact_meta
        shell: pwsh
        run: |
          "artifact_name=nano-preload-${{ github.run_id }}-${{ github.run_attempt }}" >> $env:GITHUB_OUTPUT

      - name: Record setup total time
        id: prep_total
        shell: pwsh
        run: |
          $startMs = [double]"${{ steps.prep_start.outputs.prep_start_ms }}"
          $endMs = [DateTimeOffset]::UtcNow.ToUnixTimeMilliseconds()
          $totalS = [math]::Round(($endMs - $startMs) / 1000, 2)
          "prep_total_s=$totalS" >> $env:GITHUB_OUTPUT
          Write-Host "WinShim setup total seconds: $totalS"

  winshim_matrix:
    name: "WinShim [${{ matrix.run_index }}]"
    runs-on: ${{ inputs.runner_target }}
    needs: winshim_setup
    strategy:
      fail-fast: false
      matrix:
        run_index: [1, 2, 3, 4, 5]

    steps:
      - uses: actions/checkout@v4

      - name: Prepare benchmark workload
        shell: pwsh
        run: ./scripts/benchmark/prepare-workload.ps1

      - name: Ensure Docker daemon is ready
        shell: pwsh
        run: |
          $service = Get-Service -Name docker -ErrorAction Stop
          if ($service.Status -ne "Running") {
            Write-Host "Docker service status: $($service.Status). Starting service."
            Start-Service docker
          }

          $ready = $false
          for ($attempt = 1; $attempt -le 12; $attempt++) {
            docker version 2>$null | Out-Null
            if ($LASTEXITCODE -eq 0) {
              $ready = $true
              break
            }
            Start-Sleep -Seconds 5
          }

          if (-not $ready) {
            throw "Docker daemon is unavailable on this runner."
          }

      - name: Record start time
        id: timer_start
        shell: pwsh
        run: |
          $start = [DateTimeOffset]::UtcNow.ToUnixTimeMilliseconds()
          "start_ms=$start" >> $env:GITHUB_OUTPUT

      - name: Probe matrix daemon persistence
        id: probe_local
        shell: pwsh
        run: |
          $targetTag = "winshim-nano:preload"
          $stopwatch = [System.Diagnostics.Stopwatch]::StartNew()
          $existing = docker images -q $targetTag 2>$null
          $stopwatch.Stop()

          $probeSeconds = [math]::Round($stopwatch.Elapsed.TotalSeconds, 3)
          $probeText = $probeSeconds.ToString("0.000", [System.Globalization.CultureInfo]::InvariantCulture)

          if ([string]::IsNullOrWhiteSpace($existing)) {
            "hit=false" >> $env:GITHUB_OUTPUT
            "image_id=" >> $env:GITHUB_OUTPUT
            Write-Host "Persistence probe: MISS - matrix runner daemon is clean (${probeText}s query)."
          } else {
            "hit=true" >> $env:GITHUB_OUTPUT
            "image_id=$existing" >> $env:GITHUB_OUTPUT
            Write-Host "Persistence probe: HIT - matrix runner already has $targetTag ($existing) (${probeText}s query)."
          }

          "probe_seconds=$probeText" >> $env:GITHUB_OUTPUT

      - name: Download preload artifact
        if: ${{ steps.probe_local.outputs.hit != 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.winshim_setup.outputs.tar_artifact_name }}
          path: ${{ runner.temp }}

      - name: Load image from artifact on miss
        id: artifact_load_miss
        if: ${{ steps.probe_local.outputs.hit != 'true' }}
        shell: pwsh
        run: |
          $tarPath = Join-Path $env:RUNNER_TEMP "nano-preload.tar"
          if (-not (Test-Path $tarPath)) {
            throw "Missing preloaded image tar: $tarPath"
          }

          $startMs = [DateTimeOffset]::UtcNow.ToUnixTimeMilliseconds()
          $loadOutput = docker load -i $tarPath 2>&1
          if ($LASTEXITCODE -ne 0) {
            throw "docker load failed from artifact: $tarPath`n$($loadOutput -join "`n")"
          }
          $endMs = [DateTimeOffset]::UtcNow.ToUnixTimeMilliseconds()

          $loadS = [math]::Round(($endMs - $startMs) / 1000, 2)
          $loadText = $loadS.ToString("0.00", [System.Globalization.CultureInfo]::InvariantCulture)
          "load_seconds=$loadText" >> $env:GITHUB_OUTPUT
          $loadOutput | ForEach-Object { Write-Host $_ }
          Write-Host "Artifact image load seconds: $loadText"

      - name: Finalize load method metrics
        id: load_metrics
        shell: pwsh
        run: |
          $probeHit = "${{ steps.probe_local.outputs.hit }}" -eq "true"
          if ($probeHit) {
            $loadMethod = "daemon-persistence"
            $loadSeconds = "${{ steps.probe_local.outputs.probe_seconds }}"
          } else {
            $loadMethod = "artifact-load"
            $loadSeconds = "${{ steps.artifact_load_miss.outputs.load_seconds }}"
          }

          if ([string]::IsNullOrWhiteSpace($loadSeconds)) {
            $loadSeconds = "0.00"
          }

          "load_method=$loadMethod" >> $env:GITHUB_OUTPUT
          "artifact_load_s=$loadSeconds" >> $env:GITHUB_OUTPUT
          Write-Host "Load method: $loadMethod | Load seconds: $loadSeconds"

      - name: Verify loaded image identity
        id: verify_loaded
        shell: pwsh
        run: |
          $targetTag = "winshim-nano:preload"
          $localImageId = docker images -q $targetTag
          if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($localImageId)) {
            throw "Image '$targetTag' not found after artifact load. Artifact may be corrupt."
          }

          $expectedImageId = "${{ needs.winshim_setup.outputs.image_id }}"
          if ($localImageId -ne $expectedImageId) {
            throw "Image ID mismatch after artifact load. Expected: $expectedImageId Got: $localImageId"
          }

          "image_tag=$targetTag" >> $env:GITHUB_OUTPUT
          Write-Host "WinShim subsystem ready - Tag: $targetTag | ID: $localImageId"

      - name: Manifest validator canary
        id: manifest_probe
        shell: pwsh
        run: |
          ./scripts/benchmark/manifest-probe.ps1 `
            -Image "${{ steps.verify_loaded.outputs.image_tag }}" `
            -ProbeRootPath "${{ github.workspace }}"

      - name: Locate host .NET root
        id: host_dotnet
        shell: pwsh
        run: |
          $dotnetExe = (Get-Command dotnet).Source
          $dotnetRoot = Split-Path -Parent $dotnetExe
          "dotnet_root=$dotnetRoot" >> $env:GITHUB_OUTPUT

      - name: Record boot completion time
        id: timer_boot
        shell: pwsh
        run: |
          $boot = [DateTimeOffset]::UtcNow.ToUnixTimeMilliseconds()
          "boot_ms=$boot" >> $env:GITHUB_OUTPUT

      - name: Run WinShim workload
        shell: pwsh
        run: |
          ./scripts/benchmark/run-winshim-workload.ps1 `
            -Image "${{ steps.verify_loaded.outputs.image_tag }}" `
            -StrategyMode "${{ steps.manifest_probe.outputs.strategy_mode }}" `
            -DotnetRoot "${{ steps.host_dotnet.outputs.dotnet_root }}" `
            -WorkspacePath "${{ github.workspace }}" `
            -ProjectPath "benchmark-app\benchmark-app.csproj"

      - name: Compute WinShim metrics
        id: metrics
        shell: pwsh
        run: |
          $endMs = [DateTimeOffset]::UtcNow.ToUnixTimeMilliseconds()
          $startMs = [double]"${{ steps.timer_start.outputs.start_ms }}"
          $bootMs = [double]"${{ steps.timer_boot.outputs.boot_ms }}"

          $totalS = [math]::Round(($endMs - $startMs) / 1000, 2)
          $bootS = [math]::Round(($bootMs - $startMs) / 1000, 2)
          $buildS = [math]::Round(($endMs - $bootMs) / 1000, 2)

          "total_s=$totalS" >> $env:GITHUB_OUTPUT
          "boot_s=$bootS" >> $env:GITHUB_OUTPUT
          "build_s=$buildS" >> $env:GITHUB_OUTPUT

      - name: Write WinShim timing JSON
        id: write_timing
        shell: pwsh
        run: |
          ./scripts/benchmark/write-timing.ps1 `
            -Scenario winshim `
            -RunIndex ${{ matrix.run_index }} `
            -CacheState "${{ inputs.cache_state }}" `
            -RunLabel "${{ inputs.run_label }}" `
            -TotalSeconds "${{ steps.metrics.outputs.total_s }}" `
            -BootSeconds "${{ steps.metrics.outputs.boot_s }}" `
            -BuildSeconds "${{ steps.metrics.outputs.build_s }}" `
            -ImageLoadSeconds "${{ needs.winshim_setup.outputs.load_duration_s }}" `
            -ArtifactLoadSeconds "${{ steps.load_metrics.outputs.artifact_load_s }}" `
            -SharedSetupSeconds "${{ needs.winshim_setup.outputs.prep_total_s }}" `
            -LoadSource "${{ needs.winshim_setup.outputs.load_source }}" `
            -LoadMethod "${{ steps.load_metrics.outputs.load_method }}" `
            -VolumeStrategy "${{ steps.manifest_probe.outputs.strategy_mode }}" `
            -OutputPath "$env:RUNNER_TEMP\winshim-timing.json"

          "timing_path=$env:RUNNER_TEMP\winshim-timing.json" >> $env:GITHUB_OUTPUT

      - name: Upload WinShim timing artifact
        uses: actions/upload-artifact@v4
        with:
          name: winshim-timing-${{ matrix.run_index }}
          path: ${{ steps.write_timing.outputs.timing_path }}
          if-no-files-found: error

  summary:
    name: Benchmark Summary
    runs-on: ${{ inputs.runner_target }}
    needs: [baseline, persistence_probe, winshim_setup, winshim_matrix]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download timing artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: timing-artifacts
          pattern: "*-timing-*"
          merge-multiple: false

      - name: Generate benchmark summary
        shell: pwsh
        run: |
          python scripts/benchmark/summarize.py `
            --artifacts ./timing-artifacts `
            --summary-file "$env:GITHUB_STEP_SUMMARY" `
            --expected-samples 5 `
            --shared-setup-s "${{ needs.winshim_setup.outputs.prep_total_s }}"
